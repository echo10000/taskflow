<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Task Manager</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body>

  <header class="header">
    <div class="header__logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">TaskFlow</span>
    </div>
    <div class="header__stats">
      <div class="stat">
        <span class="stat__num" id="totalCount">0</span>
        <span class="stat__label">Total</span>
      </div>
      <div class="stat">
        <span class="stat__num" id="doneCount">0</span>
        <span class="stat__label">Done</span>
      </div>
    </div>
  </header>

  <main class="main">

    <section class="input-section">
      <div class="input-wrapper">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="What needs to be done?"
          maxlength="100"
          autocomplete="off"
        />
        <select id="categorySelect" class="category-select">
          <option value="general">General</option>
          <option value="work">Work</option>
          <option value="study">Study</option>
          <option value="personal">Personal</option>
        </select>
        <button id="addBtn" class="add-btn">+ Add Task</button>
      </div>
    </section>

    <section class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
      <button class="filter-btn clear-btn" id="clearDoneBtn">Clear Done</button>
    </section>

    <section class="task-list-section">
      <ul class="task-list" id="taskList"></ul>
      <div class="empty-state" id="emptyState">
        <span class="empty-icon">✦</span>
        <p>No tasks yet. Add one above!</p>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>TaskFlow &mdash; Built with HTML, CSS &amp; JS</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
